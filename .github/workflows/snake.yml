name: generate animated snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: elightknight23
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=ebedf0,9be9a8,40c463,30a14e,216e39
            dist/github-contribution-grid-snake-dark.svg?palette=161b22,0e4429,006d32,26a641,39d353

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
